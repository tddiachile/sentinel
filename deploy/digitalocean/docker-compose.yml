services:
  # ---------------------------------------------------------------------------
  # Traefik — reverse proxy with automatic Let's Encrypt SSL
  # Manages HTTPS termination and routing for the Droplet.
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v3.0
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=proxy"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Redirect all HTTP → HTTPS
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      # Let's Encrypt via HTTP-01 challenge
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--log.level=INFO"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - proxy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Frontend — React SPA + Nginx (also proxies /api to auth-service)
  # Only public-facing container. Traefik handles TLS.
  # ---------------------------------------------------------------------------
  frontend:
    image: ${REGISTRY}/sentinel-frontend:${IMAGE_TAG:-latest}
    depends_on:
      - auth-service
    networks:
      - proxy
      - sentinel-internal
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.sentinel.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.sentinel.entrypoints=websecure"
      - "traefik.http.routers.sentinel.tls.certresolver=letsencrypt"
      - "traefik.http.services.sentinel.loadbalancer.server.port=80"
      # Security headers (complement to nginx.conf)
      - "traefik.http.middlewares.sentinel-headers.headers.stsSeconds=63072000"
      - "traefik.http.middlewares.sentinel-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.routers.sentinel.middlewares=sentinel-headers"

  # ---------------------------------------------------------------------------
  # Backend — Go auth service
  # Internal only. Accessed via Nginx proxy inside frontend container.
  # ---------------------------------------------------------------------------
  auth-service:
    image: ${REGISTRY}/sentinel-auth:${IMAGE_TAG:-latest}
    environment:
      - DB_HOST=postgres
      - DB_NAME=${DB_NAME:-sentinel}
      - DB_USER=${DB_USER:-sentinel}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_PRIVATE_KEY_PATH=/app/keys/private.pem
      - JWT_PUBLIC_KEY_PATH=/app/keys/public.pem
      - BOOTSTRAP_ADMIN_USER=${BOOTSTRAP_ADMIN_USER:-admin}
      - BOOTSTRAP_ADMIN_PASSWORD=${BOOTSTRAP_ADMIN_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # RSA keys — generated by setup.sh and persisted on the Droplet host
      - ./files/keys:/app/keys:ro
    networks:
      - sentinel-internal
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # PostgreSQL 15
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-sentinel}
      POSTGRES_USER: ${DB_USER:-sentinel}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sentinel}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sentinel-internal
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis 7
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a ${REDIS_PASSWORD} ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sentinel-internal
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  letsencrypt:     # Let's Encrypt certificates (persisted across restarts)

networks:
  # Public network — Traefik + frontend containers
  proxy:
    driver: bridge
  # Private network — auth-service, postgres, redis (no external access)
  sentinel-internal:
    driver: bridge
