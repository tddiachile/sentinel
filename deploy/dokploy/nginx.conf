server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers (TLS headers are added by Traefik upstream)
    add_header X-Content-Type-Options  nosniff    always;
    add_header X-Frame-Options         DENY       always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # -------------------------------------------------------------------------
    # Proxy: REST API → auth-service (Go backend)
    # -------------------------------------------------------------------------
    location /api/ {
        proxy_pass         http://auth-service:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # -------------------------------------------------------------------------
    # Proxy: health check → auth-service
    # -------------------------------------------------------------------------
    location = /health {
        proxy_pass         http://auth-service:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # -------------------------------------------------------------------------
    # Proxy: JWKS (RFC 7517) → auth-service
    # Needed by external backends that verify JWT locally.
    # -------------------------------------------------------------------------
    location /.well-known/ {
        proxy_pass         http://auth-service:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # -------------------------------------------------------------------------
    # SPA fallback — all other routes serve index.html (React Router)
    # -------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable access logs for favicon and robots to reduce noise
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
}
